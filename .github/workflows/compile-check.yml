name: Compile and Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lyrisync_plus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile main.py gui_manager.py vmix_openlp_handler.py preach_info_db.py

      - name: Unit tests
        run: |
          cd ..
          python -m unittest tests/test_preach_info_db.py
